<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>My Life Story</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="hero">
  <h1>🌿 My Life Story</h1>
  <p>Scroll untuk melihat perjalanan hidup</p>
</div>

<div class="timeline">

  {% for item in data %}
  <div class="card">

    <img src="{{ url_for('static', filename=item.img) }}">

    <div class="text">
      {{ item.text }}
    </div>

  </div>
  {% endfor %}

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
