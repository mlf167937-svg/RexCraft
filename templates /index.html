<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>My Life Story</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="intro">
  <h1 class="intro-text">Welcome to My Story</h1>
</div>

<div id="content">

  <section class="hero">
    <h1>My Life History</h1>
    <p>Scroll untuk melihat perjalanan hidupku 🌿</p>
  </section>

  <section class="timeline">

    {% for item in data %}
    <div class="card">

      <img src="{{ url_for('static', filename=item.img) }}">

      <div class="text-box">
        <p>{{ item.text }}</p>
      </div>

    </div>
    {% endfor %}

  </section>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
