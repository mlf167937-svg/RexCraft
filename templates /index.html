<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>My Story</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f1a;
      color: white;
    }

    .hero {
      text-align: center;
      padding: 40px;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1b1b2f;
      padding: 15px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      max-height: 350px;
      object-fit: cover;
    }

    .text {
      white-space: pre-line;
      opacity: 0.9;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>🌿 My Life Story</h1>
</div>

<div class="timeline">

  {% for item in data %}
  <div class="card">

    <img src="{{ url_for('static', filename=item.img) }}">

    <div class="text">
      {{ item.text }}
    </div>

  </div>
  {% endfor %}

</div>

</body>
</html>
